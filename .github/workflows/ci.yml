name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: forge build + test
    # 156번 self-hosted runner (jsong-cicd-01)에 meta-zkbridge 전용 label 부여 전제
    runs-on: [self-hosted, Linux, X64, metazkbridge]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Foundry (idempotent)
        run: |
          if ! command -v forge >/dev/null 2>&1; then
            curl -L https://foundry.paradigm.xyz | bash
            export PATH="$HOME/.foundry/bin:$PATH"
            foundryup
          fi
          echo "$HOME/.foundry/bin" >> $GITHUB_PATH

      - name: Install Foundry deps
        working-directory: contracts
        run: forge install --no-git --shallow foundry-rs/forge-std succinctlabs/sp1-contracts

      - name: forge build
        working-directory: contracts
        run: forge build --sizes

      - name: forge test
        working-directory: contracts
        run: forge test -vvv

  prover-check:
    name: cargo check (prover scripts)
    runs-on: [self-hosted, Linux, X64, metazkbridge]
    # prover/ 는 Phase 1 에선 shell wrapper만 있으므로 lint만 수행
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          shellcheck prover/*.sh scripts/*.sh
