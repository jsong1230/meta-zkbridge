[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# solc_versionмқҖ кі м •н•ҳм§Җ м•ҠмқҢ вҖ” sp1-contractsмқҳ к°Ғ verifier лІ„м „мқҙ мһҗмІҙ pragmaлҘј к°Җм§җ
# Metadium testnetмқҖ pre-Camellia (pre-Shanghai) мғҒнғңлқј PUSH0 opcode лҜём§Җмӣҗ вҶ’ parisлЎң кі м •
evm_version = "paris"
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[fmt]
line_length = 100
tab_width = 4
func_attrs_with_params_multiline = true
ignore = ["lib/**"]

[rpc_endpoints]
metadium_testnet = "${METADIUM_TESTNET_RPC}"
sepolia = "${SEPOLIA_RPC}"

[etherscan]
# Metadium explorerлҠ” лі„лҸ„ verifier м—”л“ңнҸ¬мқёнҠё нҷ•мқё н•„мҡ”
